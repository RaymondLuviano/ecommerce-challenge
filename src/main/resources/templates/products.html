<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>E-Commerce Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">E-Commerce Challenge</span>
    </div>
</nav>

<div class="container">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Products</h1>
        <div class="d-flex gap-2">
            <a href="/purchases/history" class="btn btn-outline-dark">Purchase History</a>
            <a href="/products/new" class="btn btn-primary">New Product</a>
        </div>
    </div>

    <form method="get" action="/products" class="row g-2 mb-4">
        <div class="col-md-10">
            <input type="text"
                   name="query"
                   class="form-control"
                   placeholder="Search by name, sku or category"
                   th:value="${query}">
        </div>
        <div class="col-md-2 d-grid">
            <button class="btn btn-outline-primary" type="submit">Search</button>
        </div>
    </form>

    <form method="post"
          action="/products/import"
          enctype="multipart/form-data"
          class="card card-body mb-4">

        <h5>Import products from CSV</h5>

        <div class="row g-2">
            <div class="col-md-10">
                <input type="file" name="file" class="form-control" accept=".csv" required>
            </div>
            <div class="col-md-2 d-grid">
                <button class="btn btn-success" type="submit">Import</button>
            </div>
        </div>
    </form>

    <div th:if="${importResult != null}" class="alert alert-info">
        <strong>Import result:</strong>
        Total rows: <span th:text="${importResult.totalRows()}"></span>,
        Imported: <span th:text="${importResult.importedRows()}"></span>,
        Failed: <span th:text="${importResult.failedRows()}"></span>

        <ul class="mt-2 mb-0" th:if="${!importResult.errors().isEmpty()}">
            <li th:each="error : ${importResult.errors()}" th:text="${error}"></li>
        </ul>
    </div>

    <div class="card">
        <div class="card-body">

            <table class="table table-striped align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>SKU</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Weight KG</th>
                    <th>Purchase</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.id()}"></td>
                    <td th:text="${product.name()}"></td>
                    <td th:text="${product.sku()}"></td>
                    <td th:text="${product.category()}"></td>
                    <td th:text="${product.price()}"></td>
                    <td th:text="${product.stock()}"></td>
                    <td th:text="${product.weightKg()}"></td>

                    <td>
                        <form th:action="@{/products/{id}/purchase(id=${product.id()})}" method="post" class="d-flex gap-2">
                            <input type="number"
                                   name="quantity"
                                   min="1"
                                   value="1"
                                   class="form-control form-control-sm"
                                   style="width: 80px;"
                                   required>
                            <button class="btn btn-sm btn-success" type="submit">Buy</button>
                        </form>
                    </td>

                    <td>
                        <div class="d-flex gap-2">
                            <a th:href="@{/products/{id}/edit(id=${product.id()})}"
                               class="btn btn-sm btn-warning">
                                Edit
                            </a>

                            <form th:action="@{/products/{id}/delete(id=${product.id()})}" method="post">
                                <button class="btn btn-sm btn-danger" type="submit">
                                    Delete
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>

                <tr th:if="${products.isEmpty()}">
                    <td colspan="9" class="text-center text-muted">
                        No products found
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
