<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">E-Commerce Challenge</span>
    </div>
</nav>

<div class="container">

    <div class="card">
        <div class="card-body">

            <h1 th:text="${productId == null ? 'New Product' : 'Edit Product'}"></h1>

            <form th:action="${productId == null ? '/products' : '/products/' + productId}"
                  method="post"
                  class="mt-4">

                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text"
                           name="name"
                           class="form-control"
                           th:value="${product.name()}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">SKU</label>
                    <input type="text"
                           name="sku"
                           class="form-control"
                           th:value="${product.sku()}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description"
                              class="form-control"
                              rows="3"
                              th:text="${product.description()}"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <input type="text"
                           name="category"
                           class="form-control"
                           th:value="${product.category()}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Price</label>
                    <input type="number"
                           name="price"
                           class="form-control"
                           step="0.01"
                           min="0.01"
                           th:value="${product.price()}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Stock</label>
                    <input type="number"
                           name="stock"
                           class="form-control"
                           min="0"
                           th:value="${product.stock()}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Weight KG</label>
                    <input type="number"
                           name="weightKg"
                           class="form-control"
                           step="0.01"
                           min="0"
                           th:value="${product.weightKg()}">
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a href="/products" class="btn btn-secondary">Cancel</a>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
