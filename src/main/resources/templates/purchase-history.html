<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Purchase History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">E-Commerce Challenge</span>
    </div>
</nav>

<div class="container">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Purchase History</h1>
        <a href="/products" class="btn btn-secondary">Back to Products</a>
    </div>

    <div class="card">
        <div class="card-body">

            <table class="table table-striped align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Product ID</th>
                    <th>Product</th>
                    <th>SKU</th>
                    <th>Quantity</th>
                    <th>Unit Price</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Created At</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="purchase : ${purchases}">
                    <td th:text="${purchase.id()}"></td>
                    <td th:text="${purchase.productId()}"></td>
                    <td th:text="${purchase.productName()}"></td>
                    <td th:text="${purchase.sku()}"></td>
                    <td th:text="${purchase.quantity()}"></td>
                    <td th:text="${purchase.unitPrice()}"></td>
                    <td th:text="${purchase.total()}"></td>
                    <td>
                        <span class="badge bg-success" th:text="${purchase.status()}"></span>
                    </td>
                    <td th:text="${purchase.createdAt()}"></td>
                </tr>

                <tr th:if="${purchases.isEmpty()}">
                    <td colspan="9" class="text-center text-muted">
                        No purchases found
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
